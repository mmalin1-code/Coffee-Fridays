


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dogtown Running Club — Coffee Fridays</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F5F2ED;--card:#FFFFFF;--text:#1A1714;--text-muted:#7A7470;--text-hint:#B0ABA6;
  --border:rgba(26,23,20,0.10);--border-med:rgba(26,23,20,0.18);
  --strava:#FC4C02;--maps-color:#0077ED;
  --accent:#2A5C3F;--accent-light:#E8F0EB;--accent-text:#1A3D28;
  --danger:#E24B4A;--danger-light:#FCEBEB;
  --inactive:#F0EDE8;--inactive-text:#7A7470;
}
[data-theme="dark"]{
  --bg:#0F1410;--card:#1A201B;--text:#E8EDE9;--text-muted:#8A9E8D;--text-hint:#4A5E4D;
  --border:rgba(232,237,233,0.08);--border-med:rgba(232,237,233,0.16);
  --accent:#4CAF72;--accent-light:#1A2E1E;--accent-text:#9FD4AE;
  --inactive:#151C16;--inactive-text:#5A7060;
  --danger-light:#2A1515;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem;transition:background 0.2s,color 0.2s}

.site-header{max-width:900px;margin:0 auto;padding:1.5rem 1.5rem 0;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:14px}
.logo{height:52px;width:auto;display:block}
.header-titles .club-name{font-family:'DM Serif Display',serif;font-size:1.3rem;font-weight:400;color:var(--accent);line-height:1.1}
.header-titles .page-title{font-size:13px;color:var(--text-muted);letter-spacing:0.04em;margin-top:2px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.theme-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;background:var(--card);border:0.5px solid var(--border-med);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text-muted);transition:background 0.15s;user-select:none}
.theme-toggle:hover{background:var(--accent-light)}
.toggle-track{width:28px;height:16px;background:var(--border-med);border-radius:8px;position:relative;transition:background 0.2s;flex-shrink:0}
.toggle-track.on{background:var(--accent)}
.toggle-thumb{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left 0.2s}
.toggle-track.on .toggle-thumb{left:14px}
.picker-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-muted)}
.picker-input{font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--accent);background:none;border:none;outline:none;padding:0;min-width:80px;max-width:180px;text-align:right}
.picker-input::placeholder{color:var(--text-hint);font-weight:400}

.week-nav-bar{max-width:900px;margin:1.25rem auto 0;padding:0 1.5rem;display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:8px}
.week-cell{display:flex;flex-direction:column;gap:3px}
.week-cell.center{align-items:center;text-align:center}
.week-cell.right{align-items:flex-end;text-align:right}
.week-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:0;transition:color 0.15s}
.week-btn:hover{color:var(--text)}
.week-pill{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;background:var(--accent);color:#fff;border-radius:20px;padding:4px 14px;white-space:nowrap}
.week-date{font-size:12px;color:var(--text-muted)}

main{max-width:900px;margin:1.5rem auto 0;padding:0 1.5rem}
.status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);margin-bottom:1.25rem;min-height:20px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-hint);flex-shrink:0}
.status-dot.live{background:#4CAF50;animation:pulse 2s infinite}
.status-dot.saving{background:#FFA726}
.status-dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.name-banner{background:var(--card);border:0.5px solid var(--border-med);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px}
.my-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--accent-text);flex-shrink:0}
.name-banner-body{flex:1;min-width:0}
.name-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px}
.name-input{width:100%;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;background:none;border:none;outline:none;color:var(--text);padding:0}
.name-input::placeholder{color:var(--text-hint);font-weight:400}
.name-hint{font-size:11px;color:var(--text-hint);margin-top:2px}

.shop-card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:12px;transition:border-color 0.2s}
.shop-card:hover{border-color:var(--border-med)}
.shop-card.mine{border-color:var(--accent);border-width:1.5px}
.card-section{border-top:0.5px solid var(--border);padding-top:12px;margin-top:12px}
.section-lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-hint);margin-bottom:8px}

.shop-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.shop-name-wrap{flex:1;min-width:0}
.shop-name{font-size:17px;font-weight:500}
.shop-meta{font-size:13px;font-weight:400;color:var(--text-muted);margin-left:8px}
.shop-links{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
.shop-link{font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:4px;text-decoration:none;transition:color 0.15s}
.shop-link:hover{color:var(--text)}
.shop-link.maps{color:var(--maps-color)}
.shop-link.strava{color:var(--strava)}
.card-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{background:none;border:0.5px solid var(--border-med);border-radius:8px;cursor:pointer;color:var(--text-muted);font-size:12px;padding:4px 9px;display:flex;align-items:center;gap:4px;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.icon-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.icon-btn.danger:hover{background:var(--danger-light);color:var(--danger);border-color:var(--danger)}

.attendees{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 10px;border-radius:20px;background:var(--inactive);color:var(--inactive-text);border:0.5px solid var(--border)}
.chip.mine-chip{background:var(--accent-light);color:var(--accent-text);border-color:rgba(42,92,63,0.25)}
.chip.maybe-chip{background:#FAEEDA;color:#854F0B;border-color:rgba(186,117,23,0.2)}
[data-theme="dark"] .chip.maybe-chip{background:#2A1E0A;color:#FAC775;border-color:rgba(250,199,117,0.2)}
.chip-time{font-size:10px;opacity:0.65;margin-left:2px}

.signup-area{display:flex;flex-direction:column;gap:8px}
.already-signed{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--accent-light);border-radius:8px;padding:8px 12px}
.already-msg{font-size:13px;color:var(--accent-text);font-weight:500}
.leave-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-muted);font-family:'DM Sans',sans-serif;text-decoration:underline;padding:0}
.leave-btn:hover{color:var(--danger)}
.signup-row{display:flex;gap:8px;flex-wrap:wrap}
.field-input{font-size:13px;font-family:'DM Sans',sans-serif;padding:7px 12px;border-radius:8px;border:0.5px solid var(--border-med);background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s}
.field-input:focus{border-color:var(--accent)}
.name-field{flex:1;min-width:120px}
.time-field{width:110px}
.join-btn{font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;padding:7px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;white-space:nowrap;transition:background 0.15s,transform 0.1s}
.join-btn:hover{background:#1e4a30}
.join-btn:active{transform:scale(0.97)}
.maybe-btn{font-size:12px;font-family:'DM Sans',sans-serif;padding:5px 12px;border-radius:8px;border:0.5px solid var(--border-med);background:none;color:var(--text-muted);cursor:pointer;transition:background 0.15s;align-self:flex-start}
.maybe-btn:hover{background:var(--inactive)}

.edit-panel{background:var(--inactive);border-radius:10px;padding:12px;margin-top:12px}
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
@media(max-width:500px){.edit-grid{grid-template-columns:1fr}}
.edit-field label{font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.03em}
.edit-input{width:100%;font-size:13px;font-family:'DM Sans',sans-serif;padding:6px 10px;border-radius:7px;border:0.5px solid var(--border-med);background:var(--card);color:var(--text);outline:none;transition:border-color 0.15s}
.edit-input:focus{border-color:var(--accent)}
.save-edit-btn{font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;padding:6px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer}

.add-section{margin-top:1.5rem;padding-top:1.25rem;border-top:0.5px solid var(--border)}
.add-card{background:var(--card);border:0.5px dashed var(--border-med);border-radius:16px;padding:1.25rem}
.add-card h3{font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:12px}
.form-section-lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-hint);margin:12px 0 6px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.form-grid{grid-template-columns:1fr}}
.form-field label{font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px;letter-spacing:0.03em;text-transform:uppercase}
.form-field input{width:100%;font-size:13px;font-family:'DM Sans',sans-serif;padding:7px 12px;border-radius:8px;border:0.5px solid var(--border-med);background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s}
.form-field input:focus{border-color:var(--accent)}
.form-field .hint{font-size:11px;color:var(--text-hint);margin-top:3px}
.add-btn{margin-top:14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;padding:7px 20px;border-radius:8px;border:0.5px solid var(--border-med);background:var(--card);color:var(--text);cursor:pointer;transition:background 0.15s}
.add-btn:hover{background:var(--accent-light);border-color:var(--accent)}

.empty-state{text-align:center;padding:2.5rem 0;color:var(--text-hint);font-size:14px;line-height:1.7}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:13px;padding:8px 18px;border-radius:20px;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1}
hr.divider{border:none;border-top:0.5px solid var(--border);margin:0}
</style>
</head>

<div class="week-nav-bar">
  <div class="week-cell">
    <button class="week-btn" onclick="changeWeek(-1)">&#8249; Last week</button>
    <span class="week-date" id="prev-date"></span>
  </div>
  <div class="week-cell center">
    <div class="week-pill">&#9679; This Friday</div>
    <span class="week-date" id="curr-date"></span>
  </div>
  <div class="week-cell right">
    <button class="week-btn" onclick="changeWeek(1)">Next week &#8250;</button>
    <span class="week-date" id="next-date"></span>
  </div>
</div>

<main>
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-msg">Connecting...</span>
  </div>

  <div class="name-banner">
    <div class="my-avatar" id="my-avatar">?</div>
    <div class="name-banner-body">
      <div class="name-label">Your name</div>
      <input class="name-input" type="text" id="my-name" placeholder="Enter your name to sign up..." autocomplete="off" oninput="onMyNameInput()"/>
      <div class="name-hint" id="my-hint">Set your name once &mdash; then tap a shop to sign up.</div>
    </div>
  </div>

  <div id="shops-list"></div>

  <div class="add-section">
    <div class="add-card">
      <h3>Add this week's coffee shop</h3>
      <div class="form-section-lbl">Coffee shop info</div>
      <div class="form-grid">
        <div class="form-field"><label>Shop name *</label><input type="text" id="f-name" placeholder="e.g. Blueprint Coffee"/></div>
        <div class="form-field"><label>Opens at</label><input type="text" id="f-opens" placeholder="e.g. 7:00 AM"/></div>
        <div class="form-field"><label>Directions URL</label><input type="url" id="f-maps" placeholder="https://maps.apple.com/?q=..."/><span class="hint">Apple Maps or Google Maps link</span></div>
        <div class="form-field"><label>Neighborhood / note</label><input type="text" id="f-hood" placeholder="e.g. The Loop"/></div><div class="form-field"><label>Address</label><input type="text" id="f-address" placeholder="e.g. 6225 Delmar Blvd, St. Louis, MO"/></div>
      </div>
      <div class="form-section-lbl">Run route</div>
      <div class="form-grid">
        <div class="form-field"><label>Strava route URL</label><input type="url" id="f-strava" placeholder="https://www.strava.com/routes/..."/></div>
        <div class="form-field"><label>Route distance</label><input type="text" id="f-distance" placeholder="e.g. 5.2 miles"/></div>
      </div>
      <button class="add-btn" onclick="submitAddShop()">Add shop</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFAtNFHIQCs7O-0-YvPRChMQLWzGuzEUo9fErQRgWmaoUjUxAMjNQ5THiaQCm3-viv/exec";
let weekOffset = 0;
let allData = {};
let myName = localStorage.getItem("dtrc_myName") || "";
let isDark = localStorage.getItem("dtrc_theme") === "dark";

function getMonday(d){const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);return new Date(new Date(d).setDate(diff))}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmt(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
function fmtShort(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}
function getFriday(off){const o=off===undefined?weekOffset:off;const m=getMonday(new Date());m.setDate(m.getDate()+o*7);return addDays(m,4)}
function getKey(off){return getFriday(off===undefined?weekOffset:off).toISOString().split("T")[0]}
function ensureWeek(k){if(!allData[k])allData[k]={shops:[],picker:""}}
function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function initials(n){return(n||"").trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase()||"?"}
function isUrl(u,h){try{return new URL(u).hostname.includes(h)}catch(e){return false}}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400)}
function setStatus(st,msg){document.getElementById("status-dot").className="status-dot"+(st?" "+st:"");document.getElementById("status-msg").textContent=msg}

function applyTheme(){
  document.documentElement.setAttribute("data-theme",isDark?"dark":"light");
  const tr=document.getElementById("toggle-track");
  if(tr)tr.classList.toggle("on",isDark);
  const ic=document.getElementById("theme-icon");
  const lb=document.getElementById("theme-lbl");
  if(ic)ic.textContent=isDark?"\uD83C\uDF19":"\u2600\uFE0F";
  if(lb)lb.textContent=isDark?"Dark":"Light";
}
function toggleTheme(){isDark=!isDark;localStorage.setItem("dtrc_theme",isDark?"dark":"light");applyTheme()}

function onMyNameInput(){
  myName=document.getElementById("my-name").value.trim();
  localStorage.setItem("dtrc_myName",myName);
  document.getElementById("my-avatar").textContent=myName?initials(myName):"?";
  document.getElementById("my-hint").textContent=myName?"Tap \"I\'m in\" on any shop below.":"Set your name once — then tap a shop to sign up.";
  render();
}

function onPickerInput(){
  const k=getKey();ensureWeek(k);
  allData[k].picker=document.getElementById("picker-name").value.trim();
  saveData();
}

function updateWeekNav(){
  document.getElementById("prev-date").textContent=fmt(getFriday(weekOffset-1));
  document.getElementById("curr-date").textContent=fmt(getFriday(weekOffset));
  document.getElementById("next-date").textContent=fmt(getFriday(weekOffset+1));
}

async function loadData(){
  setStatus("","Connecting...");
  try{
    const r=await fetch(SCRIPT_URL+"?action=load");
    const j=await r.json();
    if(j.data)allData=j.data;
    setStatus("live","Live — changes sync to everyone");
  }catch(e){setStatus("error","Offline — changes won't save")}
  render();
}

async function saveData(){
  setStatus("saving","Saving...");
  try{
    await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"save",data:allData})});
    setStatus("live","Saved");
  }catch(e){setStatus("error","Save failed")}
}

function changeWeek(dir){weekOffset+=dir;render()}

function render(){
  updateWeekNav();
  const k=getKey();
  ensureWeek(k);
  const week=allData[k];
  const pEl=document.getElementById("picker-name");
  if(pEl&&document.activeElement!==pEl)pEl.value=week.picker||"";
  if(myName){
    const mn=document.getElementById("my-name");
    if(mn&&document.activeElement!==mn)mn.value=myName;
    document.getElementById("my-avatar").textContent=initials(myName);
    document.getElementById("my-hint").textContent="Tap \"I\'m in\" on any shop below.";
  }
  const list=document.getElementById("shops-list");
  list.innerHTML="";
  if(!week.shops||week.shops.length===0){
    list.innerHTML=`<div class="empty-state">No shop added yet for ${fmt(getFriday())}.<br>Use the form below to add this week's coffee stop.</div>`;
    return;
  }
  week.shops.forEach((shop,si)=>{
    const going=shop.attendees||[];
    const interested=shop.interested||[];
    const times=shop.times||{};
    const isMine=myName&&going.includes(myName);
    const isInt=myName&&interested.includes(myName);
    const card=document.createElement("div");
    card.className="shop-card"+(isMine?" mine":"");

    const mapsLink=(shop.maps)
      ?`<a class="shop-link maps" href="${esc(shop.maps)}" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1a3.5 3.5 0 0 1 3.5 3.5C9.5 7.5 6 11 6 11S2.5 7.5 2.5 4.5A3.5 3.5 0 0 1 6 1z" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="4.5" r="1" fill="currentColor"/></svg>Directions &#8599;</a>`:"";

    const stravaLink=(shop.strava&&isUrl(shop.strava,"strava.com"))
      ?`<a class="shop-link strava" href="${esc(shop.strava)}" target="_blank" rel="noopener"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 9l2.5-5 2 3.5 1.5-2.5 1.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Strava route &#8599;</a>`:"";

    const goingChips=going.map(n=>`<span class="chip${n===myName?" mine-chip":""}">${esc(n)}${times[n]?`<span class="chip-time">${esc(times[n])}</span>`:""}</span>`).join("");
    const intChips=interested.map(n=>`<span class="chip maybe-chip">${esc(n)} &mdash; maybe</span>`).join("");

    const signupHtml=isMine
      ?`<div class="already-signed"><span class="already-msg">&#10003; You're going${times[myName]?" at "+esc(times[myName]):""}</span><button class="leave-btn" onclick="leaveShop('${esc(k)}',${si})">Remove me</button></div>`
      :`<div class="signup-row">
          <input class="field-input name-field" type="text" placeholder="${myName?esc(myName):"Your name"}" id="ni-${si}" value="${esc(myName)}" onkeydown="if(event.key==='Enter')joinShop('${esc(k)}',${si})"/>
          <input class="field-input time-field" type="text" placeholder="Arrival time" id="ti-${si}" onkeydown="if(event.key==='Enter')joinShop('${esc(k)}',${si})"/>
          <button class="join-btn" onclick="joinShop('${esc(k)}',${si})">I'm in</button>
        </div>
        ${!isInt?`<button class="maybe-btn" onclick="markInterested('${esc(k)}',${si})">Maybe / interested</button>`:
        `<button class="maybe-btn" onclick="unmarkInterested('${esc(k)}',${si})">Remove maybe</button>`}`;

    card.innerHTML=`
      <div class="shop-header-row">
        <div class="shop-name-wrap">
          <div><span class="shop-name">${esc(shop.name)}</span>${shop.neighborhood?`<span class="shop-meta">${esc(shop.neighborhood)}</span>`:""}</div>${shop.address?`<div class="shop-meta" style="margin-top:4px">${esc(shop.address)}</div>`:""}
          <div class="shop-links">
            ${mapsLink}${stravaLink}
            ${shop.opens?`<span class="shop-link"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M6 3.5V6l1.5 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>Opens ${esc(shop.opens)}</span>`:""}
            ${shop.distance?`<span class="shop-link"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 9.5c.8-1.8 2-3 4-3s3.2 1.2 4 3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="6" cy="4" r="2" stroke="currentColor" stroke-width="1.2"/></svg>${esc(shop.distance)}</span>`:""}
          </div>
        </div>
        <div class="card-actions">
          <button class="icon-btn" id="edit-btn-${si}" onclick="toggleEdit('${esc(k)}',${si})">&#9998; Edit</button>
          <button class="icon-btn danger" onclick="deleteShop('${esc(k)}',${si})">&#x2715; Remove</button>
        </div>
      </div>

      <div id="edit-panel-${si}" class="edit-panel" style="display:none">
        <div class="edit-grid">
          <div class="edit-field"><label>Shop name</label><input class="edit-input" id="e-name-${si}" value="${esc(shop.name)}"/></div>
          <div class="edit-field"><label>Opens at</label><input class="edit-input" id="e-opens-${si}" value="${esc(shop.opens||"")}"/></div>
          <div class="edit-field"><label>Directions URL</label><input class="edit-input" id="e-maps-${si}" value="${esc(shop.maps||"")}"/></div>
          <div class="edit-field"><label>Neighborhood</label><input class="edit-input" id="e-hood-${si}" value="${esc(shop.neighborhood||"")}"/></div>
          <div class="edit-field"><label>Strava URL</label><input class="edit-input" id="e-strava-${si}" value="${esc(shop.strava||"")}"/></div>
          <div class="edit-field"><label>Route distance</label><input class="edit-input" id="e-dist-${si}" value="${esc(shop.distance||"")}"/></div>
        </div>
        <button class="save-edit-btn" onclick="saveEdit('${esc(k)}',${si})">Save changes</button>
      </div>

      ${(going.length>0||interested.length>0)?`<div class="card-section"><div class="section-lbl">Who's coming</div><div class="attendees">${goingChips}${intChips}</div></div>`:""}

      <div class="card-section">
        <div class="section-lbl">Sign up</div>
        <div class="signup-area">${signupHtml}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleEdit(k,si){
  const p=document.getElementById("edit-panel-"+si);
  const b=document.getElementById("edit-btn-"+si);
  const open=p.style.display==="none";
  p.style.display=open?"block":"none";
  b.innerHTML=open?"&#x2715; Close":"&#9998; Edit";
}
function saveEdit(k,si){
  const s=allData[k].shops[si];
  s.name=document.getElementById("e-name-"+si).value.trim()||s.name;
  s.opens=document.getElementById("e-opens-"+si).value.trim();
  s.maps=document.getElementById("e-maps-"+si).value.trim();
  s.neighborhood=document.getElementById("e-hood-"+si).value.trim();
  s.strava=document.getElementById("e-strava-"+si).value.trim();
  s.distance=document.getElementById("e-dist-"+si).value.trim();
  render();saveData();showToast("Saved!");
}
function joinShop(k,si){
  const ni=document.getElementById("ni-"+si);
  const ti=document.getElementById("ti-"+si);
  const name=(ni?ni.value.trim():"")||myName;
  const time=ti?ti.value.trim():"";
  if(!name){showToast("Enter your name first");return}
  ensureWeek(k);
  allData[k].shops.forEach(shop=>{
    if(!shop.attendees)shop.attendees=[];
    if(!shop.times)shop.times={};
    if(!shop.interested)shop.interested=[];
    const idx=shop.attendees.indexOf(name);
    if(idx!==-1){shop.attendees.splice(idx,1);delete shop.times[name]}
    const ii=shop.interested.indexOf(name);
    if(ii!==-1)shop.interested.splice(ii,1);
  });
  const shop=allData[k].shops[si];
  if(!shop.attendees)shop.attendees=[];
  if(!shop.times)shop.times={};
  shop.attendees.push(name);
  if(time)shop.times[name]=time;
  if(!myName){myName=name;localStorage.setItem("dtrc_myName",myName);document.getElementById("my-name").value=myName;document.getElementById("my-avatar").textContent=initials(myName)}
  render();saveData();showToast("Signed up for "+allData[k].shops[si].name+"!");
}
function leaveShop(k,si){
  if(!myName)return;
  const shop=allData[k].shops[si];
  if(!shop.attendees)shop.attendees=[];
  if(!shop.times)shop.times={};
  const idx=shop.attendees.indexOf(myName);
  if(idx!==-1){shop.attendees.splice(idx,1);delete shop.times[myName]}
  render();saveData();showToast("Removed from "+shop.name);
}
function markInterested(k,si){
  const ni=document.getElementById("ni-"+si);
  const name=(ni?ni.value.trim():"")||myName;
  if(!name){showToast("Enter your name first");return}
  const shop=allData[k].shops[si];
  if(!shop.interested)shop.interested=[];
  if(!shop.interested.includes(name))shop.interested.push(name);
  if(!myName){myName=name;localStorage.setItem("dtrc_myName",myName)}
  render();saveData();showToast("Marked as maybe!");
}
function unmarkInterested(k,si){
  if(!myName)return;
  const shop=allData[k].shops[si];
  if(!shop.interested)shop.interested=[];
  const idx=shop.interested.indexOf(myName);
  if(idx!==-1)shop.interested.splice(idx,1);
  render();saveData();
}
function deleteShop(k,si){
  if(!confirm("Remove this shop?"))return;
  allData[k].shops.splice(si,1);
  render();saveData();
}
function submitAddShop(){
  const name=document.getElementById("f-name").value.trim();
  if(!name){showToast("Shop name is required");return}
  const k=getKey();
  ensureWeek(k);
  allData[k].shops.push({
    name,
    opens:document.getElementById("f-opens").value.trim(),
    maps:document.getElementById("f-maps").value.trim(),
    neighborhood:document.getElementById("f-hood").value.trim(),
    address:document.getElementById("f-address").value.trim(),
    strava:document.getElementById("f-strava").value.trim(),
    distance:document.getElementById("f-distance").value.trim(),
    attendees:[],interested:[],times:{}
  });
  ["f-name","f-opens","f-maps","f-hood","f-address","f-strava","f-distance"].forEach(id=>document.getElementById(id).value="");
  render();saveData();showToast("Shop added!");
}
applyTheme();
loadData();
</script>
</body>
</html>
